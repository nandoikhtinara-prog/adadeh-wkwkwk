<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Rahasia</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: #111;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #555;
            background: #222;
        }

        .btn-submit {
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #ccc;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kirim Pesan Rahasia</h1>
        <p>Tulis apa pun di bawah ini. Identitasmu tidak akan pernah diketahui.</p>

        <form action="https://formsubmit.co/Nandoikhtinara@gmail.com" method="POST">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="Seseorang mengirim pesan anonim!">
            <input type="hidden" name="_next" value="https://nandoikhtinara-prog.github.io/nanzzzz/anonim.html">

            <textarea name="Pesan" placeholder="Ketik pesanmu di sini..." required></textarea>
            
            <button type="submit" class="btn-submit">KIRIM ANONIM</button>
        </form>

        <div class="footer">Encrypted & Anonymous</div>
    </div>

</body>
</html>
